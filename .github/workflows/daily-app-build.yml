name: Daily app builds

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    env:
      CHESSFISH_ANDROID_KEYSTORE_BASE64: ${{ secrets.CHESSFISH_ANDROID_KEYSTORE_BASE64 }}
      CHESSFISH_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.CHESSFISH_ANDROID_KEYSTORE_PASSWORD }}
      CHESSFISH_ANDROID_KEY_ALIAS: ${{ secrets.CHESSFISH_ANDROID_KEY_ALIAS }}
      CHESSFISH_ANDROID_KEY_PASSWORD: ${{ secrets.CHESSFISH_ANDROID_KEY_PASSWORD }}
      CHESSFISH_ANDROID_VERSION_CODE: ${{ github.run_number }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Refresh Stockfish binaries
        run: npm run update:stockfish

      - name: Run tests
        run: npm test

      - name: Prepare Android release keystore
        if: ${{ env.CHESSFISH_ANDROID_KEYSTORE_BASE64 != '' && env.CHESSFISH_ANDROID_KEYSTORE_PASSWORD != '' && env.CHESSFISH_ANDROID_KEY_ALIAS != '' && env.CHESSFISH_ANDROID_KEY_PASSWORD != '' }}
        run: |
          echo "$CHESSFISH_ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/chessfish-release.jks

      - name: Build signed Android release APK
        if: ${{ env.CHESSFISH_ANDROID_KEYSTORE_BASE64 != '' && env.CHESSFISH_ANDROID_KEYSTORE_PASSWORD != '' && env.CHESSFISH_ANDROID_KEY_ALIAS != '' && env.CHESSFISH_ANDROID_KEY_PASSWORD != '' }}
        run: npm run android:release:apk
        env:
          CHESSFISH_ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/app/chessfish-release.jks

      - name: Build Android debug APK
        if: ${{ env.CHESSFISH_ANDROID_KEYSTORE_BASE64 == '' || env.CHESSFISH_ANDROID_KEYSTORE_PASSWORD == '' || env.CHESSFISH_ANDROID_KEY_ALIAS == '' || env.CHESSFISH_ANDROID_KEY_PASSWORD == '' }}
        run: npm run android:debug

      - name: Collect signed Android APK
        if: ${{ env.CHESSFISH_ANDROID_KEYSTORE_BASE64 != '' && env.CHESSFISH_ANDROID_KEYSTORE_PASSWORD != '' && env.CHESSFISH_ANDROID_KEY_ALIAS != '' && env.CHESSFISH_ANDROID_KEY_PASSWORD != '' }}
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/release/app-release.apk artifacts/chessfish-android.apk

      - name: Collect debug Android APK
        if: ${{ env.CHESSFISH_ANDROID_KEYSTORE_BASE64 == '' || env.CHESSFISH_ANDROID_KEYSTORE_PASSWORD == '' || env.CHESSFISH_ANDROID_KEY_ALIAS == '' || env.CHESSFISH_ANDROID_KEY_PASSWORD == '' }}
        run: |
          mkdir -p debug-artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk debug-artifacts/chessfish-android-debug.apk

      - name: Upload signed Android APK
        if: ${{ env.CHESSFISH_ANDROID_KEYSTORE_BASE64 != '' && env.CHESSFISH_ANDROID_KEYSTORE_PASSWORD != '' && env.CHESSFISH_ANDROID_KEY_ALIAS != '' && env.CHESSFISH_ANDROID_KEY_PASSWORD != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: chessfish-android-release-assets
          path: artifacts/*.apk
          retention-days: 14

      - name: Upload debug Android APK
        if: ${{ env.CHESSFISH_ANDROID_KEYSTORE_BASE64 == '' || env.CHESSFISH_ANDROID_KEYSTORE_PASSWORD == '' || env.CHESSFISH_ANDROID_KEY_ALIAS == '' || env.CHESSFISH_ANDROID_KEY_PASSWORD == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: chessfish-android-debug-apk
          path: debug-artifacts/*.apk
          retention-days: 14

  macos:
    name: macOS DMG
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh Stockfish binaries
        run: npm run update:stockfish

      - name: Run tests
        run: npm test

      - name: Build macOS DMG
        run: npm run electron:pack
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Collect macOS DMG
        run: |
          mkdir -p artifacts
          for dmg in release/*.dmg; do
            cp "$dmg" "artifacts/chessfish-macos.dmg"
          done

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: chessfish-macos-release-assets
          path: artifacts/*.dmg
          retention-days: 14

  publish:
    name: Publish latest release
    runs-on: ubuntu-latest
    needs:
      - android
      - macos

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: chessfish-*-release-assets
          path: release-assets
          merge-multiple: true

      - name: Add update manifest
        run: |
          APP_VERSION="$(node -p "require('./package.json').version")"
          cat > release-assets/update-manifest.json <<EOF
          {
            "appVersion": "$APP_VERSION",
            "buildNumber": "${{ github.run_number }}",
            "commit": "${{ github.sha }}",
            "builtAt": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          EOF

      - name: Publish mutable latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > release-notes.md <<EOF
          Download for Android: https://github.com/Julian-Bruns/chess/releases/download/latest/chessfish-android.apk

          Download for macOS: https://github.com/Julian-Bruns/chess/releases/download/latest/chessfish-macos.dmg

          Android install guide: https://github.com/Julian-Bruns/chess/blob/main/docs/android-install.md

          Automated Chessfish build from $GITHUB_SHA.
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest "$GITHUB_SHA"
          git push --force origin refs/tags/latest

          if gh release view latest >/dev/null 2>&1; then
            gh release edit latest \
              --title "Latest Chessfish build" \
              --notes-file release-notes.md
          else
            gh release create latest \
              --title "Latest Chessfish build" \
              --notes-file release-notes.md
          fi

          gh release upload latest release-assets/* --clobber
