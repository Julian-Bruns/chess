name: Daily app builds

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    env:
      CHESSFISH_ANDROID_KEYSTORE_BASE64: ${{ secrets.CHESSFISH_ANDROID_KEYSTORE_BASE64 }}
      CHESSFISH_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.CHESSFISH_ANDROID_KEYSTORE_PASSWORD }}
      CHESSFISH_ANDROID_KEY_ALIAS: ${{ secrets.CHESSFISH_ANDROID_KEY_ALIAS }}
      CHESSFISH_ANDROID_KEY_PASSWORD: ${{ secrets.CHESSFISH_ANDROID_KEY_PASSWORD }}
      CHESSFISH_ANDROID_KEYSTORE_TYPE: PKCS12
      CHESSFISH_ANDROID_VERSION_CODE: ${{ github.run_number }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Android SDK packages
        run: |
          ANDROID_SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          SDKMANAGER="$ANDROID_SDK/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            FOUND_SDKMANAGER="$(find "$ANDROID_SDK/cmdline-tools" -path "*/bin/sdkmanager" -type f 2>/dev/null | sort -r | head -n 1 || true)"
            if [ -n "$FOUND_SDKMANAGER" ]; then
              SDKMANAGER="$FOUND_SDKMANAGER"
            elif command -v sdkmanager >/dev/null 2>&1; then
              SDKMANAGER="$(command -v sdkmanager)"
            else
              echo "sdkmanager not found."
              echo "ANDROID_HOME=${ANDROID_HOME:-unset}"
              echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-unset}"
              echo "Checked Android SDK directory: $ANDROID_SDK"
              exit 127
            fi
          fi

          echo "Using sdkmanager: $SDKMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Refresh Stockfish binaries
        run: npm run update:stockfish
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Add bundled update manifest
        run: |
          APP_VERSION="$(node -p "require('./package.json').version")"
          DOWNLOAD_BASE="https://github.com/${{ github.repository }}/releases/download/latest"
          cat > public/update-manifest.json <<EOF
          {
            "appVersion": "$APP_VERSION",
            "buildNumber": "${{ github.run_number }}",
            "commit": "${{ github.sha }}",
            "builtAt": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "downloads": {
              "macos": {
                "appVersion": "$APP_VERSION",
                "path": "$DOWNLOAD_BASE/chessfish-macos.dmg"
              },
              "windows": {
                "appVersion": "$APP_VERSION",
                "path": "$DOWNLOAD_BASE/chessfish-windows.exe"
              },
              "ios": {
                "appVersion": "$APP_VERSION",
                "path": "$DOWNLOAD_BASE/chessfish-ios.ipa"
              },
              "android": {
                "appVersion": "$APP_VERSION",
                "path": "$DOWNLOAD_BASE/chessfish-android.apk"
              }
            }
          }
          EOF

      - name: Run tests
        run: npm test

      - name: Validate Android release signing
        run: |
          missing=0
          for name in \
            CHESSFISH_ANDROID_KEYSTORE_BASE64 \
            CHESSFISH_ANDROID_KEYSTORE_PASSWORD \
            CHESSFISH_ANDROID_KEY_ALIAS \
            CHESSFISH_ANDROID_KEY_PASSWORD
          do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required to publish a player-installable Android APK."
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "Create one Android release keystore and add these secrets to the repository."
            echo "See docs/android-signing.md for exact commands."
            exit 1
          fi

      - name: Prepare Android release keystore
        run: |
          echo "$CHESSFISH_ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/chessfish-release.jks

      - name: Build signed Android release APK
        run: npm run android:release:apk
        env:
          CHESSFISH_ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/app/chessfish-release.jks

      - name: Collect signed Android APK
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/release/app-release.apk artifacts/chessfish-android.apk

      - name: Upload signed Android APK
        uses: actions/upload-artifact@v4
        with:
          name: chessfish-android-release-assets
          path: artifacts/*.apk
          retention-days: 14

  macos:
    name: macOS DMG
    runs-on: macos-latest
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh Stockfish binaries
        run: npm run update:stockfish
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Add bundled update manifest
        run: |
          APP_VERSION="$(node -p "require('./package.json').version")"
          DOWNLOAD_BASE="https://github.com/${{ github.repository }}/releases/download/latest"
          cat > public/update-manifest.json <<EOF
          {
            "appVersion": "$APP_VERSION",
            "buildNumber": "${{ github.run_number }}",
            "commit": "${{ github.sha }}",
            "builtAt": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "downloads": {
              "macos": {
                "appVersion": "$APP_VERSION",
                "path": "$DOWNLOAD_BASE/chessfish-macos.dmg"
              },
              "windows": {
                "appVersion": "$APP_VERSION",
                "path": "$DOWNLOAD_BASE/chessfish-windows.exe"
              },
              "ios": {
                "appVersion": "$APP_VERSION",
                "path": "$DOWNLOAD_BASE/chessfish-ios.ipa"
              },
              "android": {
                "appVersion": "$APP_VERSION",
                "path": "$DOWNLOAD_BASE/chessfish-android.apk"
              }
            }
          }
          EOF

      - name: Run tests
        run: npm test

      - name: Validate macOS signing
        run: |
          missing=0
          for name in CSC_LINK CSC_KEY_PASSWORD
          do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required to publish a macOS app users can open without Terminal."
              missing=1
            fi
          done

          for name in APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID
          do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required to notarize the macOS app."
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "Add a Developer ID Application certificate as CSC_LINK/CSC_KEY_PASSWORD and Apple notarization credentials before publishing macOS builds."
            exit 1
          fi

      - name: Build macOS DMG
        run: npm run build && npx electron-builder --mac dmg --publish never --config.mac.forceCodeSigning=true

      - name: Verify macOS app
        run: |
          APP_PATH="$(find release -name 'Chessfish.app' -type d | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "::error::Packaged Chessfish.app was not found."
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          spctl --assess --type execute --verbose=4 "$APP_PATH"

      - name: Collect macOS DMG
        run: |
          mkdir -p artifacts
          cp release/chessfish-macos.dmg artifacts/chessfish-macos.dmg

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: chessfish-macos-release-assets
          path: artifacts/*.dmg
          retention-days: 14

  publish:
    name: Publish latest release
    runs-on: ubuntu-latest
    needs:
      - android
      - macos

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: chessfish-*-release-assets
          path: release-assets
          merge-multiple: true

      - name: Add update manifest
        run: |
          APP_VERSION="$(node -p "require('./package.json').version")"
          DOWNLOAD_BASE="https://github.com/${{ github.repository }}/releases/download/latest"
          cat > release-assets/update-manifest.json <<EOF
          {
            "appVersion": "$APP_VERSION",
            "buildNumber": "${{ github.run_number }}",
            "commit": "${{ github.sha }}",
            "builtAt": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "downloads": {
              "macos": {
                "appVersion": "$APP_VERSION",
                "path": "$DOWNLOAD_BASE/chessfish-macos.dmg"
              },
              "windows": {
                "appVersion": "$APP_VERSION",
                "path": "$DOWNLOAD_BASE/chessfish-windows.exe"
              },
              "ios": {
                "appVersion": "$APP_VERSION",
                "path": "$DOWNLOAD_BASE/chessfish-ios.ipa"
              },
              "android": {
                "appVersion": "$APP_VERSION",
                "path": "$DOWNLOAD_BASE/chessfish-android.apk"
              }
            }
          }
          EOF

      - name: Publish mutable latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DOWNLOAD_BASE="https://github.com/$GITHUB_REPOSITORY/releases/download/latest"
          APP_VERSION="$(node -p "require('./package.json').version")"
          cat > release-notes.md <<EOF
          Chessfish is a local Stockfish chess app.

          App version: $APP_VERSION

          macOS ($APP_VERSION): Download $DOWNLOAD_BASE/chessfish-macos.dmg, open it, and drag Chessfish to Applications.

          Windows ($APP_VERSION): Download $DOWNLOAD_BASE/chessfish-windows.exe and open the installer.

          iOS ($APP_VERSION): Download $DOWNLOAD_BASE/chessfish-ios.ipa.

          Android ($APP_VERSION): Download $DOWNLOAD_BASE/chessfish-android.apk, open it, and tap Install.
          EOF

          if gh release view latest >/dev/null 2>&1; then
            gh release edit latest \
              --title "Latest Chessfish build" \
              --notes-file release-notes.md
            gh release upload latest release-assets/* --clobber
          else
            gh release create latest \
              --title "Latest Chessfish build" \
              --notes-file release-notes.md \
              release-assets/*
          fi

          echo "Published release:"
          gh release view latest --json url --jq .url
